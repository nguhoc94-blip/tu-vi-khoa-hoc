<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>app_config</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.6rem; text-align: left; }
    nav a { margin-right: 1rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/config">Config</a>
    <form method="post" action="/admin/logout" style="display:inline"><button type="submit">Logout</button></form>
  </nav>
  <h1>app_config</h1>
  <table>
    <thead><tr><th>Key</th><th>Updated</th><th>Draft</th><th></th></tr></thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td><code>{{ r.config_key }}</code></td>
        <td>{{ r.updated_at }}</td>
        <td>{% if r.has_draft %}có{% else %}—{% endif %}</td>
        <td><a href="/admin/config/{{ r.config_key }}/edit">Sửa</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
