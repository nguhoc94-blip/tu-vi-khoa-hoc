<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Admin — Đăng nhập</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 3rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; }
    input[type=email], input[type=password] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; }
    button { margin-top: 1.25rem; padding: 0.5rem 1rem; }
    .err { color: #b00020; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Admin</h1>
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login">
    <label>Email <input type="email" name="email" required autocomplete="username"/></label>
    <label>Mật khẩu <input type="password" name="password" required autocomplete="current-password"/></label>
    <button type="submit">Đăng nhập</button>
  </form>
</body>
</html>
