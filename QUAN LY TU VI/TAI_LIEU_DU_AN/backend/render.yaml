# Render.com baseline — primary web service (Nhịp 3).
# Platform liveness MUST use /health (not /readiness) per Engineering lock.
# See docs/runbook_deploy.md for env vars and verify steps.

services:
  - type: web
    name: tuvi-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: LOG_LEVEL
        value: INFO
